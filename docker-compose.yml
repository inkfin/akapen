# 一键部署批改任务中台（FastAPI + asyncio worker + SQLite）。
# 用法：
#   1) cp .env.example .env  # 然后填 DASHSCOPE_API_KEY / API_KEYS / WEBHOOK_SECRET 等
#   2) mkdir -p data && (Linux 上若宿主 uid != 1000：sudo chown -R 1000:1000 data)
#   3) docker compose up -d --build
#   4) curl http://127.0.0.1:8000/v1/livez   # 应返回 200

services:
  backend:
    build:
      context: .
      # 想跟宿主 uid 对齐，可以 export USER_UID=$(id -u) USER_GID=$(id -g) 再 build
      args:
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    image: akapen-backend:latest
    container_name: akapen-backend
    restart: unless-stopped
    # tini 转发 SIGTERM，让 FastAPI lifespan 能干净收尾（worker 把队列里的任务标 cancelled）
    init: true
    # 容器内永远监听 8000；改 host 端口请只动左边。BACKEND_PORT 在 .env 中保留默认 8000。
    ports:
      - "${HOST_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # 容器内强制走 0.0.0.0 / 8000，覆盖 .env 里可能设的 BACKEND_HOST/BACKEND_PORT
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: "8000"
    volumes:
      # SQLite (grading.db) + uploads/ + logs/ + records/ 全部挂回宿主机
      - ./data:/app/data
      # 想热更 prompts 而不重新打镜像，把下面这行解开就行（容器内文件随宿主同步）
      # - ./prompts:/app/prompts:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; r = urllib.request.urlopen('http://127.0.0.1:8000/v1/livez', timeout=3); sys.exit(0 if r.status == 200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # 2C2G 服务器留点 buffer：backend 最多吃 1.5G 内存。web 容器再分 512m，
    # 加 OS 自身留 ~50M，刚好 2G 内能跑两个（详见 docs/PLAN_CN_SINGLE_SCHOOL_2C2G.md §〇 容量预算）。
    mem_limit: 1536m
    memswap_limit: 1536m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ────────────────────────────────────────────────────────────────────────
  # 老师端 Web（Next.js + SQLite + NextAuth）
  # 与 backend 共用 docker network，用 service name 互通：
  #   web → backend：AKAPEN_BASE_URL=http://backend:8000
  #   backend → web：WEB_PUBLIC_BASE_URL=http://web:3000  （图片签名 URL / webhook 回调）
  # 二者全部走 docker bridge 内核转发，*不占公网 3 Mbps 带宽*（关键收益，详见 plan §八）。
  # ────────────────────────────────────────────────────────────────────────
  web:
    build:
      context: ./web
    image: akapen-web:latest
    container_name: akapen-web
    restart: unless-stopped
    init: true
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    env_file:
      - ./web/.env
    environment:
      # 容器互联用 service 名 —— 千万别填公网域名（hairpin 陷阱），见 docs §八
      AKAPEN_BASE_URL: http://backend:8000
      WEB_PUBLIC_BASE_URL: http://web:3000
      # SQLite 落盘到挂载点
      DATABASE_URL: file:/app/data/web.db
      # ⚠ NEXTAUTH_URL 故意不在这里写。compose 的 environment 优先级高于
      # env_file，硬编码会覆盖 web/.env 里的真实公网 URL，导致登录后跳 localhost
      # 死链（手机端尤其明显）。请只在 web/.env 里配 NEXTAUTH_URL=...
      #
      # NextAuth v5 默认在非 Vercel 环境拒绝任何 Host（防 host header 注入）。
      # 我们这里没用 Vercel，前面要么是 docker 端口直曝、要么是反代加 X-Forwarded-Host，
      # 都需要显式信任。
      AUTH_TRUST_HOST: "true"
    volumes:
      # web.db + uploads/ 全部挂回宿主，容器删了数据不丢
      - ./web/data:/app/data
    depends_on:
      backend:
        condition: service_healthy
    mem_limit: 512m
    memswap_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
